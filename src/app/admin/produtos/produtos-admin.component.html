<section class="admin-produtos">
 
  <div class="admin-topo">
    <div>
      <h2>Editar Produtos</h2>
      <p>Altere imagem, descrição e preço exibidos no cardápio.</p>
    </div>

    <a routerLink="/admin/pedidos">Ver pedidos</a>
  </div>

  <div class="admin-acoes">
    <button type="button" class="botao-atualizar" (click)="carregarProdutos()">Atualizar produtos</button>
    <button type="button" class="botao-adicionar" (click)="adicionarProduto()">Adicionar produto</button>
  </div>

  <p class="estado" *ngIf="carregando">Carregando produtos...</p>
  <p class="erro" *ngIf="erro">{{ erro }}</p>
  <p class="sucesso" *ngIf="mensagem">{{ mensagem }}</p>

  <div class="produtos-admin-grid" *ngIf="!carregando && produtos.length > 0">

    <article class="produto-editor"
             *ngFor="let p of produtos; let i = index; trackBy: trackByProduto">

      <!-- IMAGEM DO PRODUTO -->
      <img 
        [src]="getImagemSrc(p)"
        (error)="usarImagemLocal($event, p)"
        [alt]="p.name"
      >

      <div class="campos">

        <label>
          Nome
          <input type="text" [(ngModel)]="p.name" placeholder="Nome do produto">
        </label>

        <label>
          Imagem
          <select [(ngModel)]="p.imageUrl">
            <option value="">Escolha uma imagem</option>
            <option *ngFor="let imagem of imagensDisponiveis" [value]="imagem">
              {{ imagem }}
            </option>
          </select>
        </label>

        <label>
          Ou fazer upload de nova imagem
          <input
            type="file"
            accept="image/*"
            (change)="onFileSelected($event, p)"
          />
          <small *ngIf="getImagemUpload(p)" style="color: #666;">
            Arquivo selecionado: {{ getImagemUpload(p)?.name }}
          </small>
        </label>

        <label>
          Descrição
          <textarea [(ngModel)]="p.description" rows="3"></textarea>
        </label>

        <label>
          Preço
          <input type="number" min="0" step="0.01" [(ngModel)]="p.price">
        </label>

        <label class="disponivel">
          <input type="checkbox" [(ngModel)]="p.available">
          Produto disponível
        </label>

        <button type="button" (click)="salvar(p)" [disabled]="salvandoIndex === i">
          {{ salvandoIndex === i ? 'Salvando...' : (p.id ? 'Salvar alterações' : 'Criar produto') }}
        </button>

        <button type="button" class="botao-excluir" (click)="deletarProduto(p, i)">
          Excluir
        </button>

      </div>
    </article>

  </div>
