<h2>🍰 Cardápio</h2>

<div *ngFor="let p of produtos" style="border:1px solid #ccc; padding:10px; margin:10px">

  <div class="imagem-wrapper">
    <img
      [src]="imagemProduto(p)"
      (load)="onImagemLoad(p)"
      (error)="onImagemError(p); usarImagemLocal($event, p)"
      [alt]="p.name"
      width="150"
      loading="lazy"
      decoding="async"
    />
    <div class="imagem-placeholder" *ngIf="isImagemCarregando(p)">Carregando imagem...</div>
  </div>

  <h3>{{ p.name }}</h3>

  <p>{{ p.description }}</p>

  <p><strong>R$ {{ p.price }}</strong></p>

  <button (click)="adicionar(p)">Adicionar</button>

</div>
